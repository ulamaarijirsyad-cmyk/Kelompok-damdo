<!doctype html>
<html>
<head>
  <title>Marketplace MLBB</title>
  <style>
    body {
      background: #0d1117;
      color: white;
      font-family: Arial;
      margin: 0;
      padding: 20px;
    }

    h2 {
      color: #00ffc8;
    }

    button {
      background: #00ffc8;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.8;
    }

    #formBox {
      display: none;
      background: #1f2933;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: none;
      margin-bottom: 10px;
    }

    #list {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .card {
      background: #1f2933;
      border-radius: 10px;
      padding: 10px;
      width: 220px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 10px #00ffc8;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .price {
      color: #00ffc8;
      font-weight: bold;
    }

    .loading {
      color: gray;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h2>🔥 Marketplace Akun MLBB</h2>

  <button onclick="openForm()">+ Post Jual Akun</button>

  <div id="formBox">
    <h3>Post Akun</h3>

    <input type="text" id="title" placeholder="Judul" />
    <input type="text" id="rank" placeholder="Rank" />
    <input type="number" id="price" placeholder="Harga" />
    <input type="file" id="image" />
    <textarea id="desc" placeholder="Deskripsi"></textarea>

    <button onclick="uploadPost()">Upload</button>
    <button onclick="closeForm()">Tutup</button>
  </div>

  <div id="list"></div>
  

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      addDoc,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import {
      getStorage,
      ref,
      uploadBytes,
      getDownloadURL,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    // ⚠️ GANTI DENGAN CONFIG ASLI LU
    const firebaseConfig = {
      apiKey: "API_KEY",
      authDomain: "PROJECT_ID.firebaseapp.com",
      projectId: "PROJECT_ID",
      storageBucket: "PROJECT_ID.appspot.com",
      appId: "APP_ID",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const list = document.getElementById("list");
    const loading = document.getElementById("loading");

    // LOAD DATA
    async function loadData() {
      list.innerHTML = "";
      loading.style.display = "block";

      const snapshot = await getDocs(collection(db, "posts"));

      snapshot.forEach((doc) => {
        const data = doc.data();

        list.innerHTML += `
          <div class="card">
            <img src="${data.imageUrl}">
            <h4>${data.title}</h4>
            <p>Rank: ${data.rank}</p>
            <p class="price">Rp ${data.price}</p>
            <small>${data.desc}</small>
          </div>
        `;
      });

      loading.style.display = "none";
    }

    loadData();

    // FORM CONTROL
    window.openForm = function () {
      document.getElementById("formBox").style.display = "block";
    };

    window.closeForm = function () {
      document.getElementById("formBox").style.display = "none";
    };

    // UPLOAD POST
    window.uploadPost = async function () {
      const title = document.getElementById("title").value;
      const rank = document.getElementById("rank").value;
      const price = document.getElementById("price").value;
      const desc = document.getElementById("desc").value;
      const file = document.getElementById("image").files[0];

      if (!title || !rank || !price || !desc) {
        return alert("Isi semua field dulu!");
      }

      if (!file) {
        return alert("Upload gambar dulu!");
      }

      alert("Uploading...");

      const storageRef = ref(storage, "images/" + Date.now() + file.name);
      await uploadBytes(storageRef, file);
      const imageUrl = await getDownloadURL(storageRef);

      await addDoc(collection(db, "posts"), {
        title,
        rank,
        price,
        desc,
        imageUrl,
        createdAt: new Date(),
      });

      alert("Posting berhasil!");

      closeForm();
      loadData();
    };
  </script>

</body>
</html>
